<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ⬇⬇⬇ 본인 정보로 교체 ⬇⬇⬇ -->
  <title>🚀 Café de Music — by &lt;rigu1&gt;</title>
  <meta name="description" content="[음원 파일을 업로드하면 음원을 분석하여 어떤 장르가 섞여 있는지 분석하고 관련한 곡을 추천합니다.]" />
  <!-- ⬆⬆⬆ 본인 정보로 교체 ⬆⬆⬆ -->
  <link rel="stylesheet" href="style.css" />
  <!-- 11주차 — contents.md inline 렌더용 -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>
</head>
<body>

  <!-- ============ HERO ============ -->
  <header class="hero">
    <div class="container">
      <h1>🚀 AI Web 2026 Project</h1>
      <p class="tagline">A final project showcase page built with HTML, CSS, and markdown content.</p>
    </div>
  </header>

  <main class="container">

    <!-- ============ 데모 카드 ============ -->
    <section class="demo-card">
      <!-- ⬇⬇⬇ screenshot.png 를 본인 프로젝트 화면 캡쳐로 교체 ⬇⬇⬇ -->
      <img class="screenshot" src="screenshot.png" alt="[Café de Music] 데모 화면" />
      <!-- ⬆⬆⬆ screenshot.png 를 본인 프로젝트 화면 캡쳐로 교체 ⬆⬆⬆ -->

      <div class="cta">
        <!-- ⬇⬇⬇ 다음 주(10주차) 데모 띄운 후 href="#" 를 진짜 도메인으로 ⬇⬇⬇ -->

        <a class="btn btn-primary" href="https://s01-demo.aiweb2026.site">
          ▶ Live Demo <span class="badge">Coming Week 10</span>
        </a>
        <!-- ⬆⬆⬆ 다음 주에 href="https://&lt;본인 ID&gt;-demo.aiweb2026.site" 로 변경 ⬆⬆⬆ -->

        <a class="btn btn-secondary" href="https://github.com/Rigu1/AI-Barista" target="_blank" rel="noopener">
          ⌨ Source on GitHub
        </a>
      </div>
    </section>

    <!-- ============ 본문 (contents.md 인라인 렌더) ============ -->
    <section class="content">
      <!-- ⬇⬇⬇ 같은 폴더의 contents.md 를 수정하면 자동 반영 ⬇⬇⬇ -->
      <zero-md src="contents.md" no-shadow></zero-md>
      <!-- ⬆⬆⬆ 같은 폴더의 contents.md 를 수정하면 자동 반영 ⬆⬆⬆ -->
    </section>

    <!-- ============ Giscus 댓글 (8장에서 추가) ============ -->
    <section id="comments" class="comments">
      <h2>💬 이 프로젝트 어떠세요?</h2>
      <p class="comments-note">
        GitHub 계정으로 로그인하면 댓글이 본인 리포의 GitHub Discussions에 자동 저장됩니다.
      </p>

      <!--
        ⬇⬇⬇ 9주차 SECTION 8 에서 giscus.app 가 자동 생성한 script 코드를 여기에 붙여넣기 ⬇⬇⬇
        교체할 속성:
          - data-repo
          - data-repo-id
          - data-category-id
        나머지 속성은 그대로 두세요.
      -->
      <div class="giscus"></div>
      <script src="https://giscus.app/client.js"
        data-repo="rigu1/s01-aiweb2026"
        data-repo-id="R_kgDOSPzOQw"
        data-category="Announcements"
        data-category-id="DIC_kwDOSPzOQ84C79es"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="ko"
        crossorigin="anonymous"
        async>
      </script>
      <!-- ⬆⬆⬆ giscus 설정값 교체 ⬆⬆⬆ -->
    </section>
  </main>

  <footer>
    <div class="container">
      <p>
        2026 AI 웹 융합 · 9주차 데모 소개 페이지 ·
        <a href="https://aiweb2026.site">aiweb2026.site</a>
      </p>
    </div>
  </footer>
</body>
</html>
